name: Build Windows VST3

on:
  push:
    branches: [ 'claude/voidsynth-vst3-synth-40btn' ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate audio resources
        run: python scripts/generate_audio_resources.py --output-dir Resources

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release

      - name: Find and upload VST3
        run: |
          Get-ChildItem -Path "build" -Filter "*.vst3" -Recurse | ForEach-Object {
            Write-Host "Found: $($_.FullName)"
          }

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VOIDSYNTH-Windows-VST3
          path: |
            build/**/*.vst3
            build/**/*.exe
          retention-days: 90
